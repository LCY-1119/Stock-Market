<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>每日行情 · 我的美股看板</title>
<style>
  :root{
    --bg:#f6f7f4;
    --card:#ffffff;
    --ink:#1c2330;
    --ink-soft:#5b6472;
    --line:#e3e6df;
    --up:#0e8a4d;
    --up-soft:#e3f3ea;
    --down:#c4382f;
    --down-soft:#fae9e7;
    --accent:#1c2330;
    --mono:"SF Mono",ui-monospace,Menlo,Consolas,monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:-apple-system,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
    line-height:1.5;
    padding:20px 16px 48px;
  }
  .wrap{max-width:760px;margin:0 auto}

  header{display:flex;justify-content:space-between;align-items:baseline;
    border-bottom:2px solid var(--ink);padding-bottom:12px;margin-bottom:20px}
  header h1{font-size:20px;font-weight:700;letter-spacing:.02em}
  header .stamp{font-family:var(--mono);font-size:12px;color:var(--ink-soft);text-align:right}

  .card{background:var(--card);border:1px solid var(--line);border-radius:10px;
    padding:18px;margin-bottom:14px}

  /* 持仓主卡 */
  .hero .tag{display:inline-block;font-size:12px;font-weight:600;letter-spacing:.08em;
    color:var(--ink-soft);border:1px solid var(--line);border-radius:99px;padding:2px 10px;margin-bottom:10px}
  .hero .row{display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:8px}
  .hero .name{font-size:15px;color:var(--ink-soft);margin-bottom:2px}
  .hero .price{font-family:var(--mono);font-size:44px;font-weight:700;line-height:1.1}
  .hero .delta{font-family:var(--mono);font-size:18px;font-weight:600;
    padding:4px 12px;border-radius:8px}
  .hero .sub{font-size:13px;color:var(--ink-soft);margin-top:4px}
  .hero svg{width:100%;height:120px;margin-top:14px;display:block}

  .up{color:var(--up)} .bg-up{background:var(--up-soft)}
  .down{color:var(--down)} .bg-down{background:var(--down-soft)}

  /* 指数卡 */
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:14px}
  @media (max-width:560px){.grid{grid-template-columns:1fr}}
  .mini .name{font-size:13px;color:var(--ink-soft)}
  .mini .price{font-family:var(--mono);font-size:20px;font-weight:700;margin-top:2px}
  .mini .delta{font-family:var(--mono);font-size:13px;font-weight:600}
  .mini svg{width:100%;height:36px;margin-top:8px;display:block}

  /* 观察列表 */
  h2{font-size:14px;font-weight:700;letter-spacing:.06em;color:var(--ink-soft);
    margin:24px 0 10px;text-transform:uppercase}
  table{width:100%;border-collapse:collapse;background:var(--card);
    border:1px solid var(--line);border-radius:10px;overflow:hidden}
  th,td{padding:12px 14px;text-align:right;font-size:14px;border-bottom:1px solid var(--line)}
  th{font-size:12px;color:var(--ink-soft);font-weight:600;background:#fbfcfa}
  th:first-child,td:first-child{text-align:left}
  tr:last-child td{border-bottom:none}
  td.num{font-family:var(--mono);font-weight:600}
  td .sym{font-family:var(--mono);font-size:12px;color:var(--ink-soft);display:block}

  footer{margin-top:28px;font-size:12px;color:var(--ink-soft);line-height:1.7}
  #loading{padding:40px;text-align:center;color:var(--ink-soft)}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>每日行情</h1>
    <div class="stamp" id="stamp">加载中</div>
  </header>

  <div id="loading">正在读取数据……</div>
  <div id="app" style="display:none">
    <div class="card hero" id="hero"></div>
    <div class="grid" id="indices"></div>
    <h2>观察列表</h2>
    <table>
      <thead><tr><th>名称</th><th>现价</th><th>日涨跌</th><th>近3月</th></tr></thead>
      <tbody id="watch"></tbody>
    </table>
    <footer>
      数据来源 Yahoo Finance,每个交易日收盘后自动更新,可能有延迟。绿涨红跌(美股惯例)。
      本页面仅作学习记录,不构成任何投资建议。
    </footer>
  </div>
</div>

<script>
function fmt(n){return n.toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2})}
function sign(n){return (n>=0?"+":"")+fmt(n)}
function cls(n){return n>=0?"up":"down"}

function sparkline(closes,w,h,color,fill){
  const min=Math.min(...closes),max=Math.max(...closes),span=(max-min)||1;
  const pts=closes.map((c,i)=>{
    const x=i/(closes.length-1)*w;
    const y=h-4-((c-min)/span)*(h-8);
    return [x.toFixed(1),y.toFixed(1)];
  });
  const line=pts.map(p=>p.join(",")).join(" ");
  let area="";
  if(fill){
    area=`<polygon points="0,${h} ${line} ${w},${h}" fill="${color}" opacity="0.10"/>`;
  }
  return `<svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">${area}
    <polyline points="${line}" fill="none" stroke="${color}" stroke-width="2"
      stroke-linejoin="round" stroke-linecap="round"/></svg>`;
}

function color(n){return n>=0?getComputedStyle(document.documentElement).getPropertyValue("--up"):getComputedStyle(document.documentElement).getPropertyValue("--down")}

fetch("data.json?t="+Date.now())
  .then(r=>{if(!r.ok)throw new Error(r.status);return r.json()})
  .then(data=>{
    document.getElementById("stamp").textContent="更新于 "+data.updated_utc;
    const items=data.items;
    const hold=items.find(i=>i.kind==="holding");
    const idx=items.filter(i=>i.kind==="index");
    const watch=items.filter(i=>i.kind==="watch");

    if(hold){
      const c=cls(hold.change_pct);
      document.getElementById("hero").innerHTML=`
        <span class="tag">我的持仓</span>
        <div class="row">
          <div>
            <div class="name">${hold.name} · ${hold.symbol}</div>
            <div class="price">$${fmt(hold.price)}</div>
          </div>
          <div style="text-align:right">
            <span class="delta ${c} bg-${c}">${sign(hold.change_pct)}%</span>
            <div class="sub">今日 ${sign(hold.change)} 美元 · 近3月 ${sign(hold.period_pct)}%</div>
          </div>
        </div>
        ${sparkline(hold.closes,700,120,color(hold.period_pct),true)}`;
    }

    document.getElementById("indices").innerHTML=idx.map(i=>`
      <div class="card mini">
        <div class="name">${i.name}</div>
        <div class="price">${fmt(i.price)}</div>
        <div class="delta ${cls(i.change_pct)}">${sign(i.change_pct)}%</div>
        ${sparkline(i.closes,200,36,color(i.period_pct),false)}
      </div>`).join("");

    document.getElementById("watch").innerHTML=watch.map(i=>`
      <tr>
        <td>${i.name}<span class="sym">${i.symbol}</span></td>
        <td class="num">$${fmt(i.price)}</td>
        <td class="num ${cls(i.change_pct)}">${sign(i.change_pct)}%</td>
        <td class="num ${cls(i.period_pct)}">${sign(i.period_pct)}%</td>
      </tr>`).join("");

    document.getElementById("loading").style.display="none";
    document.getElementById("app").style.display="block";
  })
  .catch(e=>{
    document.getElementById("loading").innerHTML=
      "还没有数据。请到仓库的 Actions 页面手动运行一次「每日更新行情数据」,大约一分钟后刷新本页。<br>("+e+")";
  });
</script>
</body>
</html>
